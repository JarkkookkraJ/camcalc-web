
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Camera Geometry Calculator</title>
    <meta name="description" content="Compute FoV, PPD, IFOV, and pixel footprint at range." />
  </head>
  <body>
    <header>
      <h1>Camera Geometry Calculator</h1>
      <p>Compute FoV, PPD, IFOV, and pixel footprint at range.</p>
    </header>

    <main>
      <section class="panel">
        <h2>Inputs</h2>
        <div class="grid">
          <label>
            Units
            <div class="unit-toggle" role="group" aria-label="Unit system">
              <button id="unit_metric" class="unit-btn active" type="button">Metric</button>
              <button id="unit_imperial" class="unit-btn" type="button">Imperial (US)</button>
            </div>
          </label>

          <label>
            Mode
            <div class="unit-toggle" role="group" aria-label="Calculation mode">
              <button id="mode_standard" class="unit-btn active" type="button">Standard</button>
              <button id="mode_pro" class="unit-btn" type="button">Pro</button>
            </div>
          </label>

          <label>
            Resolution (width × height)
            <div class="row">
              <input id="width_px" type="number" min="1" value="4000" />
              <span>×</span>
              <input id="height_px" type="number" min="1" value="3000" />
              <span>px</span>
            </div>
          </label>

          <label>
            Pixel size
            <div class="row">
              <input id="pixel_size_um" type="number" step="0.01" min="0.01" placeholder="e.g., 3.45" />
              <span>µm</span>
            </div>
          </label>

          <label>
            Diagonal FOV
            <div class="row">
              <input id="dfov_deg" type="number" step="0.01" min="1" max="179" value="80" />
              <span>deg</span>
            </div>
          </label>

          <label>
            Projection model
            <select id="projection">
              <option value="rectilinear" selected>Rectilinear (default)</option>
              <option value="equidistant">Equidistant</option>
              <option value="equisolid">Equisolid-angle</option>
              <option value="orthographic">Orthographic</option>
              <option value="stereographic">Stereographic</option>
            </select>
          </label>

          <label>
            Range (optional)
            <div class="row">
              <input id="range_m" type="number" step="0.1" min="0" placeholder="e.g., 10" />
              <span id="range_unit_label">m</span>
            </div>
          </label>
        </div>

        <div class="actions">
          <button id="compute_btn">Compute</button>
          <button id="share_btn" title="Copy sharable URL with current inputs">Share</button>
        </div>
        <p id="error" class="error" role="alert" aria-live="polite"></p>
      </section>

      <section class="panel">
        <h2>Results</h2>
        <div id="results" class="results"></div>
      </section>
    </main>

    <footer>
      <small>© 2026 — CamCalc. Built for fast concepting & spec sanity checks.</small>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
